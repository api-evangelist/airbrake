aid: airbrake
name: Airbrake
description: >-
  Airbrake is an error monitoring and application performance management
  platform that captures exceptions, deployments, and performance traces
  across web, mobile, and backend applications using language-specific
  notifier libraries. The platform aggregates errors with smart grouping,
  routing alerts to engineering teams, and provides deploy tracking and
  source map management for stack trace deminification. The Airbrake REST
  API exposes error notices, projects, deployments, and groups using query
  parameter API keys.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
